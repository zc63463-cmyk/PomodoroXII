# ===================================================================
# PomodoroXII CI/CD Pipeline
# ===================================================================
# Phase E step 1: continuous integration for the FastAPI backend.
#
# Triggers:
#   - workflow_dispatch (manual)
#   - push to main / develop
#   - pull_request to main
#
# Jobs:
#   1. test   — pytest + ruff lint
#   2. build  — Docker image build + readiness smoke (pushes only outside PRs)
# ===================================================================

name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, master, develop]
    paths:
      - "backend/**"
      - ".github/workflows/**"
      - ".gitignore"
  pull_request:
    branches: [main, master]
    paths:
      - "backend/**"
      - ".github/workflows/**"

# Cancel in-progress runs of the same ref when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"
  WORKING_DIR: backend

jobs:
  # -----------------------------------------------------------------
  # Job 1: Test — pytest + ruff
  # -----------------------------------------------------------------
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv (fast Python package manager)
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "${{ env.WORKING_DIR }}/uv.lock"

      - name: Sync dependencies (dev extras included)
        run: uv sync --frozen --extra dev

      - name: Lint with ruff
        run: uv run ruff check app tests

      - name: Run pytest
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          PYTHONUNBUFFERED: "1"
        run: |
          uv run pytest tests/ \
            --no-header \
            -q \
            --tb=short \
            --maxfail=10 \
            -p no:cacheprovider

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output-${{ github.run_id }}
          path: |
            ${{ env.WORKING_DIR }}/.pytest_cache/
            ${{ env.WORKING_DIR }}/pytest_*.log
          retention-days: 7

  # -----------------------------------------------------------------
  # Job 2: Build + smoke — all protected branches and pull requests
  # -----------------------------------------------------------------
  build:
    name: Build & Smoke Docker Image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image for smoke test
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.WORKING_DIR }}
          file: ${{ env.WORKING_DIR }}/Dockerfile
          push: false
          tags: pomodoroxii-backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Smoke-test the image
        run: |
          docker volume create pomodoroxii-smoke-data
          trap 'docker logs smoke || true; docker rm -f smoke || true; docker volume rm -f pomodoroxii-smoke-data || true' EXIT
          docker run -d -p 8000:8000 \
            --name smoke \
            -e POMODOROXII_ENVIRONMENT=production \
            -e POMODOROXII_SECRET_KEY=ci-smoke-strong-secret-7d118f6339a84cbd9eab71bcd8e51681 \
            -e POMODOROXII_DATABASE_URL=sqlite+aiosqlite:////app/data/meta.db \
            -e POMODOROXII_SPACES_DATA_DIR=/app/data/spaces \
            -v pomodoroxii-smoke-data:/app/data \
            pomodoroxii-backend:ci-${{ github.sha }}
          for attempt in {1..30}; do
            if curl -fsS http://localhost:8000/api/ready; then
              exit 0
            fi
            sleep 1
          done
          echo "READINESS_CHECK_FAILED"
          exit 1

      - name: Push main/master image to GHCR
        if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master')
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/pomodoroxii-backend
          docker tag pomodoroxii-backend:ci-${{ github.sha }} "$IMAGE:${{ github.sha }}"
          docker tag pomodoroxii-backend:ci-${{ github.sha }} "$IMAGE:latest"
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"
