services:
  backend:
    image: ghcr.io/zc63463-cmyk/pomodoroxii-backend:latest
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      POMODOROXII_SECRET_KEY: ${POMODOROXII_SECRET_KEY}
      POMODOROXII_ENVIRONMENT: production
      POMODOROXII_SPACES_DATA_DIR: /app/data/spaces
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health', timeout=5).status == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
