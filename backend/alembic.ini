[alembic]
script_location = alembic
sqlalchemy.url = sqlite+aiosqlite:///./data/meta.db

[alembic:meta]
script_location = %(here)s/alembic_meta
sqlalchemy.url = sqlite+aiosqlite:///./data/meta.db
version_table = alembic_version_meta

[alembic:space]
script_location = %(here)s/alembic_space
sqlalchemy.url = sqlite+aiosqlite:///./data/space.db
version_table = alembic_version_space

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
